{% extends "base.html" %}

{% block title %}{{ team_abbr }} - 球队详情 - NBA比赛预测系统{% endblock %}

{% block content %}
<!-- 页面加载状态 -->
<div id="loading-state" class="container py-5 text-center">
    <div class="spinner mx-auto mb-3"></div>
    <p class="text-secondary">加载球队数据...</p>
</div>

<!-- 球队详情内容 -->
<div id="team-content" style="display: none;">
    <!-- 球队头部信息 -->
    <section class="team-header py-4" style="background: linear-gradient(135deg, rgba(29, 66, 138, 0.3) 0%, rgba(245, 132, 38, 0.1) 100%);">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-3 text-center text-md-start mb-4 mb-md-0">
                    <div class="team-logo-lg mx-auto mx-md-0" id="team-logo">
                        <!-- 动态 -->
                    </div>
                </div>
                <div class="col-md-6 text-center text-md-start">
                    <div class="d-flex align-items-center justify-content-center justify-content-md-start gap-2 mb-2">
                        <span class="badge badge-nba" id="team-conference">东部</span>
                        <span class="badge badge-orange" id="team-division">分区</span>
                    </div>
                    <h1 class="display-5 fw-bold mb-2" id="team-name">--</h1>
                    <p class="text-secondary mb-0" id="team-city">--</p>
                </div>
                <div class="col-md-3 text-center text-md-end mt-4 mt-md-0">
                    <div class="stats-card d-inline-block">
                        <div class="stats-number" id="team-win-pct">--</div>
                        <div class="stats-label">赛季胜率</div>
                        <div class="mt-2">
                            <span class="text-success" id="team-wins">0</span>
                            <span class="text-secondary mx-1">-</span>
                            <span class="text-danger" id="team-losses">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 快速操作 -->
    <section class="py-3">
        <div class="container">
            <div class="d-flex flex-wrap gap-2 justify-content-center">
                <a href="/predict?home={{ team_abbr }}" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i>作为主队预测
                </a>
                <a href="/predict?away={{ team_abbr }}" class="btn btn-outline-primary">
                    <i class="fas fa-plane me-2"></i>作为客队预测
                </a>
                <button class="btn btn-secondary" onclick="window.history.back()">
                    <i class="fas fa-arrow-left me-2"></i>返回
                </button>
            </div>
        </div>
    </section>

    <!-- 球队风格标签 -->
    <section class="py-4" id="team-style">
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-tags me-2"></i>球队风格标签
                </div>
                <div class="card-body" id="style-tags">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
    </section>

    <!-- 赛季统计图表 -->
    <section class="py-4">
        <div class="container">
            <h2 class="text-white mb-4">
                <i class="fas fa-chart-line me-2 text-nba-orange"></i>赛季数据
            </h2>
            
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="chart-container">
                        <div class="chart-title">
                            <i class="fas fa-basketball me-2 text-nba-orange"></i>场均数据
                        </div>
                        <div id="avg-stats-chart" style="height: 300px;"></div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="chart-container">
                        <div class="chart-title">
                            <i class="fas fa-fire me-2 text-nba-orange"></i>进攻/防守效率
                        </div>
                        <div id="efficiency-chart" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 详细统计数据 -->
    <section class="py-4">
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-table me-2"></i>详细统计
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <tbody id="stats-table">
                                <!-- 动态加载 -->
                            </table>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 近期比赛 -->
    <section class="py-4" id="recent-games">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-white mb-0">
                    <i class="fas fa-history me-2 text-nba-orange"></i>近期比赛
                </h2>
                <div class="text-secondary small" id="games-range">最近10场</div>
            </div>
            
            <div class="row g-3" id="recent-games-list">
                <!-- 动态加载 -->
            </div>
        </div>
    </section>

    <!-- 雷达图对比 -->
    <section class="py-4">
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-broadcast-tower me-2"></i>能力雷达图
                </div>
                <div class="card-body">
                    <div id="radar-chart" style="height: 400px;"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- 与其他球队对比 -->
    <section class="py-4">
        <div class="container">
            <h2 class="text-white mb-4">
                <i class="fas fa-balance-scale me-2 text-nba-orange"></i>与其他球队对比
            </h2>
            
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-4">
                            <label class="form-label">选择对比球队</label>
                            <select class="form-select" id="compare-team">
                                <option value="">-- 选择球队 --</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">对比维度</label>
                            <select class="form-select" id="compare-dimension">
                                <option value="win_pct">胜率</option>
                                <option value="avg_points">场均得分</option>
                                <option value="avg_assists">场均助攻</option>
                                <option value="avg_rebounds">场均篮板</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">&nbsp;</label>
                            <button class="btn btn-primary w-100" onclick="compareTeams()">
                                <i class="fas fa-search me-2"></i>对比
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-body">
                    <div id="compare-chart" style="height: 300px;"></div>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_js %}
<script>
const TEAM_ABBR = '{{ team_abbr }}';
let currentTeam = null;
let allTeams = [];

// 页面加载
document.addEventListener('DOMContentLoaded', async function() {
    // 更新页面标题
    document.title = `${TEAM_ABBR} - 球队详情 - NBA比赛预测系统`;
    
    // 加载数据
    await loadTeamData();
    
    // 加载所有球队（用于对比）
    await loadAllTeams();
    
    // 初始化图表
    initRadarChart();
});

// 加载球队数据
async function loadTeamData() {
    try {
        const response = await api.getTeamDetail(TEAM_ABBR);
        if (response.success) {
            currentTeam = response.data;
            renderTeamInfo();
            renderStats();
            renderRecentGames();
            updateCharts();
            
            // 隐藏加载状态，显示内容
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('team-content').style.display = 'block';
        }
    } catch (error) {
        console.error('加载球队数据失败:', error);
        document.getElementById('loading-state').innerHTML = `
            <div class="alert-danger-custom py-4">
                <i class="fas fa-exclamation-circle me-2"></i>
                加载失败：${error.message}
                <br><br>
                <a href="/" class="btn btn-primary">返回首页</a>
            </div>
        `;
    }
}

// 渲染球队基本信息
function renderTeamInfo() {
    const info = currentTeam.info || {};
    const stats = currentTeam.stats || {};
    
    // 球队Logo
    document.getElementById('team-logo').innerHTML = `
        <div class="team-logo-xl">${TEAM_ABBR}</div>
    `;
    
    // 基本信息
    document.getElementById('team-name').textContent = info.name || info.full_name || TEAM_ABBR;
    document.getElementById('team-city').textContent = info.city || info.arena || 'NBA';
    
    // 联盟和分区
    const conference = info.conference || (['ATL', 'BOS', 'BRK', 'CHI', 'CHO', 'CLE', 'DET', 'IND', 'MIA', 'MIL', 'NYK', 'ORL', 'PHI', 'TOR', 'WAS'].includes(TEAM_ABBR) ? '东部' : '西部');
    const division = info.division || '未知分区';
    document.getElementById('team-conference').textContent = conference;
    document.getElementById('team-division').textContent = division;
    
    // 战绩
    const wins = stats.wins || info.wins || 0;
    const losses = stats.losses || info.losses || 0;
    const winPct = stats.win_pct || info.win_pct || 0.5;
    
    document.getElementById('team-wins').textContent = wins;
    document.getElementById('team-losses').textContent = losses;
    document.getElementById('team-win-pct').textContent = (winPct * 100).toFixed(1) + '%';
    
    // 球队风格标签
    renderStyleTags(info, stats);
}

// 渲染球队风格标签
function renderStyleTags(info, stats) {
    const tags = [];
    
    // 根据数据推断风格
    const avgPoints = stats.avg_points || 110;
    const avgRebounds = stats.avg_rebounds || 45;
    const avgAssists = stats.avg_assists || 25;
    const pace = stats.pace || 100;
    
    if (avgPoints > 115) {
        tags.push({ name: '进攻强队', class: 'style-offensive', icon: 'fa-fire' });
    } else if (avgPoints < 108) {
        tags.push({ name: '防守强队', class: 'style-defensive', icon: 'fa-shield-alt' });
    }
    
    if (pace > 102) {
        tags.push({ name: '快节奏', class: 'style-fast', icon: 'fa-bolt' });
    } else if (pace < 98) {
        tags.push({ name: '慢节奏', class: 'style-defensive', icon: 'fa-turtle' });
    }
    
    if (avgAssists > 27) {
        tags.push({ name: '团队篮球', class: 'style-balanced', icon: 'fa-users' });
    }
    
    if (avgRebounds > 48) {
        tags.push({ name: '篮板强队', class: 'style-offensive', icon: 'fa-basketball' });
    }
    
    // 添加球队类型标签
    tags.push({ name: 'NBA球队', class: 'badge-nba', icon: 'fa-basketball' });
    
    document.getElementById('style-tags').innerHTML = tags.map(tag => `
        <span class="team-style-tag ${tag.class}">
            <i class="fas ${tag.icon} me-1"></i>${tag.name}
        </span>
    `).join('');
}

// 渲染统计数据表格
function renderStats() {
    const stats = currentTeam.stats || {};
    
    const statRows = [
        { label: '场均得分', value: stats.avg_points || '--', icon: 'fa-basketball' },
        { label: '场均失分', value: stats.avg_points_allowed || '--', icon: 'fa-shield-alt' },
        { label: '场均篮板', value: stats.avg_rebounds || '--', icon: 'fa-circle' },
        { label: '场均助攻', value: stats.avg_assists || '--', icon: 'fa-hands-helping' },
        { label: '场均抢断', value: stats.avg_steals || '--', icon: 'fa-hand-paper' },
        { label: '场均盖帽', value: stats.avg_blocks || '--', icon: 'fa-arrow-up' },
        { label: '投篮命中率', value: stats.fg_pct ? (stats.fg_pct * 100).toFixed(1) + '%' : '--', icon: 'fa-bullseye' },
        { label: '三分命中率', value: stats.fg3_pct ? (stats.fg3_pct * 100).toFixed(1) + '%' : '--', icon: 'fa-basketball' },
        { label: '罚球命中率', value: stats.ft_pct ? (stats.ft_pct * 100).toFixed(1) + '%' : '--', icon: 'fa-circle-notch' },
        { label: '进攻效率', value: stats.off_rtg || '--', icon: 'fa-arrow-up' },
        { label: '防守效率', value: stats.def_rtg || '--', icon: 'fa-arrow-down' },
        { label: '净效率', value: stats.net_rtg || '--', icon: 'fa-balance-scale' },
    ];
    
    document.getElementById('stats-table').innerHTML = statRows.map((stat, index) => `
        <tr>
            <td class="text-start" style="width: 40%;">
                <i class="fas ${stat.icon} me-2 text-nba-orange"></i>${stat.label}
            </td>
            <td class="text-end fw-bold" style="width: 30%;">
                <span class="text-nba-blue">${stat.value}</span>
            </td>
            <td class="text-end" style="width: 30%;">
                <div class="progress mb-0" style="height: 6px;">
                    <div class="progress-bar" style="width: ${parseFloat(stat.value) || 50}%; background: #F58426;"></div>
                </div>
            </td>
        </tr>
    `).join('');
}

// 渲染近期比赛
function renderRecentGames() {
    const games = currentTeam.recent_games || [];
    const container = document.getElementById('recent-games-list');
    
    if (games.length === 0) {
        container.innerHTML = `
            <div class="col-12">
                <div class="alert-nba text-center py-4">
                    <i class="fas fa-calendar-times me-2"></i>
                    暂无比赛记录
                </div>
            </div>
        `;
        return;
    }
    
    document.getElementById('games-range').textContent = `最近${games.length}场`;
    
    container.innerHTML = games.map(game => {
        const isWin = game.result === 'W';
        const isHome = game.home_team === TEAM_ABBR;
        
        return `
            <div class="col-md-6 col-lg-4">
                <div class="card ${isWin ? 'border-success' : 'border-danger'}" 
                     style="border-width: 2px;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="badge ${isHome ? 'badge-nba' : 'badge-orange'}">
                                ${isHome ? '主' : '客'}
                            </span>
                            <span class="badge ${isWin ? 'badge-success' : 'badge-danger'}">
                                ${isWin ? '胜' : '负'}
                            </span>
                        </div>
                        <div class="text-center my-3">
                            <div class="d-flex justify-content-center align-items-center gap-3">
                                <div>
                                    <div class="fw-bold">${game.home_team}</div>
                                    <div class="h4 mb-0 text-nba-blue">${game.points || '--'}</div>
                                </div>
                                <div class="text-secondary">:</div>
                                <div>
                                    <div class="fw-bold">${game.away_team}</div>
                                    <div class="h4 mb-0 text-nba-orange">${game.opponent_points || '--'}</div>
                                </div>
                            </div>
                        </div>
                        <div class="text-center text-secondary small">
                            ${game.game_date || ''}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// 初始化雷达图
function initRadarChart() {
    const radarChart = echarts.init(document.getElementById('radar-chart'));
    
    // 默认数据
    const defaultData = {
        indicators: [
            { name: '得分', max: 120 },
            { name: '篮板', max: 50 },
            { name: '助攻', max: 30 },
            { name: '防守', max: 100 },
            { name: '速度', max: 100 },
            { name: '深度', max: 100 }
        ],
        teams: [
            {
                name: TEAM_ABBR,
                value: [110, 45, 25, 108, 100, 85]
            }
        ]
    };
    
    radarChart.setOption({
        tooltip: { trigger: 'item' },
        legend: {
            bottom: 10,
            textStyle: { color: '#a0a0a0' }
        },
        radar: {
            indicator: defaultData.indicators,
            splitArea: {
                areaStyle: {
                    color: ['rgba(29, 66, 138, 0.1)', 'rgba(29, 66, 138, 0.2)']
                }
            },
            axisLine: { lineStyle: { color: '#333' } },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
        },
        series: [{
            type: 'radar',
            data: defaultData.teams,
            itemStyle: {
                color: '#F58426',
                borderWidth: 2
            },
            areaStyle: {
                color: 'rgba(245, 132, 38, 0.2)'
            }
        }]
    });
}

// 更新图表
function updateCharts() {
    const stats = currentTeam.stats || {};
    
    // 场均数据柱状图
    const avgStatsChart = echarts.init(document.getElementById('avg-stats-chart'));
    avgStatsChart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: {
            type: 'category',
            data: ['得分', '篮板', '助攻', '抢断', '盖帽'],
            axisLabel: { color: '#a0a0a0' }
        },
        yAxis: {
            type: 'value',
            axisLabel: { color: '#a0a0a0' },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
        },
        series: [{
            type: 'bar',
            data: [
                stats.avg_points || 110,
                stats.avg_rebounds || 45,
                stats.avg_assists || 25,
                stats.avg_steals || 8,
                stats.avg_blocks || 5
            ],
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: '#F58426' },
                    { offset: 1, color: '#1D428A' }
                ]),
                borderRadius: [5, 5, 0, 0]
            }
        }]
    });
    
    // 效率图
    const efficiencyChart = echarts.init(document.getElementById('efficiency-chart'));
    const offRtg = parseFloat(stats.off_rtg) || 110;
    const defRtg = parseFloat(stats.def_rtg) || 110;
    
    efficiencyChart.setOption({
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            formatter: '{b}: {c}'
        },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: {
            type: 'category',
            data: ['进攻效率', '防守效率'],
            axisLabel: { color: '#a0a0a0' }
        },
        yAxis: {
            type: 'value',
            axisLabel: { color: '#a0a0a0' },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
        },
        series: [{
            type: 'bar',
            data: [
                { value: offRtg, itemStyle: { color: '#28a745' } },
                { value: defRtg, itemStyle: { color: '#dc3545' } }
            ],
            barWidth: '50%',
            itemStyle: { borderRadius: [5, 5, 0, 0] }
        }]
    });
    
    // 响应式
    window.addEventListener('resize', () => {
        avgStatsChart.resize();
        efficiencyChart.resize();
    });
}

// 加载所有球队
async function loadAllTeams() {
    try {
        const response = await api.getTeams();
        if (response.success) {
            allTeams = response.data.filter(t => t.abbr !== TEAM_ABBR);
            const select = document.getElementById('compare-team');
            select.innerHTML = '<option value="">-- 选择球队 --</option>' + 
                allTeams.map(t => `<option value="${t.abbr}">${t.abbr} - ${t.name}</option>`).join('');
        }
    } catch (error) {
        console.error('加载球队列表失败:', error);
    }
}

// 对比球队
function compareTeams() {
    const compareAbbr = document.getElementById('compare-team').value;
    const dimension = document.getElementById('compare-dimension').value;
    
    if (!compareAbbr) {
        Utils.showNotification('请选择对比球队', 'warning');
        return;
    }
    
    const compareTeam = allTeams.find(t => t.abbr === compareAbbr);
    if (!compareTeam) return;
    
    const dimLabels = {
        'win_pct': '胜率',
        'avg_points': '场均得分',
        'avg_assists': '场均助攻',
        'avg_rebounds': '场均篮板'
    };
    
    const team1Value = (currentTeam.stats && currentTeam.stats[dimension]) || 50;
    const team2Value = (compareTeam[dimension] || 0.5) * (dimension === 'win_pct' ? 100 : 1);
    
    const compareChart = echarts.init(document.getElementById('compare-chart'));
    compareChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: {
            data: [TEAM_ABBR, compareAbbr],
            textStyle: { color: '#a0a0a0' }
        },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: {
            type: 'category',
            data: [dimLabels[dimension]],
            axisLabel: { color: '#a0a0a0' }
        },
        yAxis: {
            type: 'value',
            axisLabel: { color: '#a0a0a0' },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
        },
        series: [
            {
                name: TEAM_ABBR,
                type: 'bar',
                data: [dimension === 'win_pct' ? (team1Value * 100).toFixed(1) : team1Value.toFixed(1)],
                itemStyle: { color: '#1D428A' }
            },
            {
                name: compareAbbr,
                type: 'bar',
                data: [dimension === 'win_pct' ? (team2Value * 100).toFixed(1) : team2Value.toFixed(1)],
                itemStyle: { color: '#F58426' }
            }
        ]
    });
    
    compareChart.resize();
}
</script>

<style>
.team-logo-xl {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1D428A, #2E5BAA);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 800;
    color: #fff;
    box-shadow: 0 8px 32px rgba(29, 66, 138, 0.4);
}
</style>
{% endblock %}
